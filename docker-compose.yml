version: '3.8'

services:
  web:
    image: anasandnikhatdevops/my-web-app:latest
    ports:
      - "8080:80"
    volumes:
      - ./:/usr/share/nginx/html

  database:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
